<!DOCTYPE html>
<html>
<head>
<title>Random Decision Maker</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    height: 80px;
    padding: 8px;
    resize: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    border: none;
    background: #4facfe;
    color: white;
    font-weight: bold;
    border-radius: 6px;
}

button:hover {
    background: #008cff;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎲 Decision Maker</h2>
    <p>Enter options separated by commas</p>

    <textarea id="options" placeholder="Pizza, Burger, Momos"></textarea>
    <button onclick="pickOption()">Pick Random</button>

    <div class="result" id="result"></div>
</div>

<script>
function pickOption() {
    var input = document.getElementById("options").value;
    var resultDiv = document.getElementById("result");

    if (input.trim() === "") {
        resultDiv.innerHTML = "Please enter some options!";
        return;
    }

    var options = input.split(",").map(function(item) {
        return item.trim();
    }).filter(function(item) {
        return item !== "";
    });

    if (options.length === 0) {
        resultDiv.innerHTML = "Enter valid options!";
        return;
    }

    var randomIndex = Math.floor(Math.random() * options.length);
    var chosen = options[randomIndex];

    resultDiv.innerHTML = "🎉 Selected: " + chosen;
}
</script>

</body>
</html>
