<!DOCTYPE html>
<html>
<head>
<title>Decision Maker</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#eaeaea;
padding:30px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

h1{
margin-bottom:5px;
}

textarea{
width:100%;
height:90px;
border-radius:8px;
border:2px solid #6ea8fe;
padding:10px;
font-size:15px;
margin-top:10px;
}

button{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
background:#5fa2e0;
color:white;
cursor:pointer;
}

button:hover{
background:#4a8fce;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

/* wheel */

.wheel-container{
position:relative;
width:320px;
margin:20px auto;
}

canvas{
border-radius:50%;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.arrow{
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-top:35px solid red;
position:absolute;
left:50%;
transform:translateX(-50%);
top:-8px;
z-index:5;
}

</style>
</head>

<body>

<div class="container">

<h1>🎲 Decision Maker</h1>
<p>Enter options separated by commas</p>

<textarea id="optionsInput">a,b,c,d</textarea>

<div class="wheel-container">

<div class="arrow"></div>

<canvas id="wheel" width="320" height="320"></canvas>

</div>

<button id="spinBtn">Spin Wheel</button>

<button id="clearBtn">Clear</button>

<div class="result" id="result">Selected: -</div>

</div>

<script>

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

let options=[];
let rotation=0;
let velocity=0;
let spinning=false;

function drawWheel(){

ctx.clearRect(0,0,320,320);

if(options.length===0) return;

const arc=(Math.PI*2)/options.length;

options.forEach((opt,i)=>{

let angle=i*arc;

ctx.beginPath();
ctx.moveTo(160,160);
ctx.arc(160,160,160,angle,angle+arc);

ctx.fillStyle=`hsl(${i*60},70%,60%)`;
ctx.fill();

ctx.save();

ctx.translate(160,160);
ctx.rotate(angle+arc/2);

ctx.fillStyle="black";
ctx.textAlign="right";
ctx.font="14px Arial";

ctx.fillText(opt,140,5);

ctx.restore();

});

}

function spin(){

if(spinning || options.length===0) return;

velocity=Math.random()*40+35;

spinning=true;

requestAnimationFrame(animate);

}

function animate(){

velocity*=0.97;

rotation+=velocity;

canvas.style.transform=`rotate(${rotation}deg)`;

if(velocity>0.3){

requestAnimationFrame(animate);

}else{

spinning=false;
showResult();

}

}

function showResult(){

const arc=360/options.length;

let deg=(rotation%360);

let index=Math.floor((360-deg)/arc)%options.length;

document.getElementById("result").innerText=
"🎉 Selected: "+options[index];

}

document.getElementById("spinBtn").onclick=()=>{

const text=document.getElementById("optionsInput").value;

options=text.split(",").map(x=>x.trim()).filter(x=>x);

drawWheel();

spin();

};

document.getElementById("clearBtn").onclick=()=>{

document.getElementById("optionsInput").value="";
options=[];
drawWheel();

document.getElementById("result").innerText="Selected: -";

};

drawWheel();

</script>

</body>
</html>
